name: turismo_tarija
description: Aplicación de turismo para Tarija - Bolivia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Notificaciones locales
  flutter_local_notifications: ^17.2.3

  # FCM HTTP v1
  googleapis_auth: ^1.6.0
  http: ^1.2.2

  # Geolocalización
  geolocator: ^13.0.2

  # Estado
  provider: ^6.1.2

  # UI
  intl: ^0.19.0
  go_router: ^14.6.1
  google_fonts: ^8.0.2

  # ── NUEVAS: subida de archivos ──────────────────────────────────
  # Seleccionar imágenes de galería / cámara
  image_picker: ^1.1.2

  # Seleccionar archivos PDF
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon_model.png